experiment_name: base
seed: 42

model:
  in_channels: 4
  num_classes: 3
  encoder_type: swin        # "swin" | "resnet50"
  use_hierarchy: true
  use_se: true
  hcd_hidden: 128
  # Swin-specific
  feature_size: 48
  pretrained: true
  use_checkpoint: true

data:
  # Absolute path to the BraTS 2021 data directory.
  # Run:  python scripts/setup_data.py
  # It will print the correct value for this field.
  root: /home/nafisnaufal1426/.cache/kagglehub/datasets/dschettler8845/brats-2021-task1/versions/1

  # Manifests store only case IDs (portable, committed to git).
  # root above is used to resolve them to absolute file paths.
  train_manifest: ./manifests/train.json
  val_manifest:   ./manifests/val.json
  patch_size: [128, 128, 128]
  num_workers: 0
  persistent_workers: false
  prefetch_factor: 2
  # Sliding-window inference settings (validation)
  sw_batch_size: 2
  sw_overlap: 0.5

reproducibility:
  deterministic: false
  use_deterministic_algorithms: false

augment:
  flip_prob: 0.5
  affine_prob: 0.2          # random rotation (±15°) + scale (0.85–1.15)
  blur_prob: 0.2            # Gaussian blur
  gaussian_noise_prob: 0.1  # Gaussian noise (nnU-Net: p=0.1, std≈0.1 on z-scored data)
  gaussian_noise_std: 0.1
  intensity_prob: 0.8       # multiplicative scaling in [0.7, 1.3]
  gamma_prob: 0.3           # random gamma correction in [0.7, 1.5]
  channel_dropout_prob: 0.16

training:
  epochs: 200
  batch_size: 2
  amp: true
  grad_clip: 1.0

loss:
  bce_weight: 0.5
  dice_weight: 0.5
  consistency_weight: 0.1

optim:
  encoder_lr: 1.0e-4
  decoder_lr: 2.0e-4
  weight_decay: 1.0e-4

scheduler:
  warmup_epochs: 5
  eta_min: 1.0e-6

metrics:
  compute_hd95: true
  hd95_every: 10      # compute HD95 every N epochs and at the final epoch

logging:
  use_wandb: true
  project: brats-segmentation
  entity: "kc_brats"
  mode: online

output:
  dir: ./outputs
  save_freq: 10       # save latest.pt every N epochs (best is always saved)
